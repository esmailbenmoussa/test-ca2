name: actions-importer/actions-importer
on:
  push:
  workflow_dispatch:
concurrency:
  group: "${{ github.ref }}"
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4.1.0
    - uses: actions/cache@v3.3.2
  build:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
    - uses: actions/checkout@v4.1.0
    - uses: actions/cache@v3.3.2
    - uses: actions/upload-artifact@v4.1.0

